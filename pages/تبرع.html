<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="google-adsense-account" content="ca-pub-3891018687888271"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3891018687888271" crossorigin="anonymous"></script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>دعم الموقع - أذكاري</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;family=Tajawal:wght@300;500;700&amp;display=swap">
    
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MN3XNY6JES"></script><script>window.dataLayer = window.dataLayer || [];function gtag(){dataLayer.push(arguments);}gtag('js', new Date());gtag('config', 'G-MN3XNY6JES');</script>
    <style>
        :root {
            --primary-green: #1f4e3d;
            --ehsan-color: #00968c; /* لون منصة إحسان */
            --accent-gold: #d4af37;
            --bg-light: #fdfbf7;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-light);
            background-image: radial-gradient(#d4af3733 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 3rem 1rem 4rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-green), #14362a);
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.8rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }

        main {
            flex: 1;
            max-width: 600px;
            margin: -3rem auto 2rem; 
            width: 95%;
            position: relative;
            z-index: 10;
        }

        .container-box {
            background: var(--card-bg);
            box-shadow: 0 10px 30px rgba(31, 78, 61, 0.08);
            border-radius: 25px;
            padding: 2.5rem 1.5rem;
            border: 1px solid rgba(0,0,0,0.03);
            text-align: center;
        }

        .heart-icon {
            font-size: 3rem;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        h2 {
            color: var(--primary-green);
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }

        p {
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #555;
            font-size: 1.1rem;
        }

        .donation-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .donate-btn {
            background: var(--primary-green);
            color: white;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: block;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(31, 78, 61, 0.2);
        }

        .donate-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .ehsan-btn {
            background: var(--ehsan-color);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent-gold);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>صدقة جارية</h1>
        <span>دعم استمرارية موقع الأذكار</span>
    </header>

    <main>
        <div class="container-box">
            <div class="heart-icon">❤</div>
            <h2>ساهم في نشر الخير</h2>
            <p>
                هذا الموقع مشروع خيري غير ربحي. يمكنك المساهمة في دعمنا أو التبرع عبر المنصات الرسمية ليكون لك أجر في كل ذكر يُقرأ.
            </p>

            <div class="donation-options">
                <a href="https://ehsan.sa/" target="_blank" class="donate-btn ehsan-btn">
                    تبرع عبر منصة إحسان
                </a>
                
                <a href="https://www.paypal.me/adkaralmusliam" target="_blank" class="donate-btn">
                    تبرع عبر PayPal
                </a>
            </div>

            <a href="../index.html" class="back-link">← العودة للرئيسية</a>

            <p class="footer-note">"مَا نَقَصَتْ صَدَقَةٌ مِنْ مَالٍ"</p>
        </div>
    </main>

</body>
</html>
