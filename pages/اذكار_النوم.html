<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-MN3XNY6JES"></script><script>window.dataLayer = window.dataLayer || [];function gtag(){dataLayer.push(arguments);}gtag('js', new Date());gtag('config', 'G-MN3XNY6JES');</script>
    <!-- الخطوط -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;700&display=swap">
    
    <style>
        :root {
            --primary-green: #1f4e3d;
            --accent-gold: #d4af37;
            --bg-light: #fdfbf7;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-light);
            background-image: radial-gradient(#d4af3733 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* زر الرجوع للرئيسية */
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: white;
            color: var(--primary-green);
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: var(--accent-gold);
            color: white;
        }

        header {
            padding: 4rem 1rem 3rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-green), #14362a);
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: var(--accent-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-weight: 300;
            font-size: 1.2rem;
        }

        /* حاوية الأذكار */
        #azkar-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 15px;
        }

        /* كرت الذكر */
        .zekr-card {
            background: var(--card-bg);
            border: 1px solid rgba(0,0,0,0.03);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(31, 78, 61, 0.05);
            user-select: none;
        }

        .zekr-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(31, 78, 61, 0.1);
        }

        .zekr-card.is-done {
            opacity: 0.5;
            background: #f4f6f5;
            transform: scale(0.98);
            box-shadow: none;
            filter: grayscale(0.5);
        }

        .zekr-body {
            padding: 25px;
        }

        .zekr-text {
            font-size: 1.5rem;
            line-height: 1.9;
            text-align: justify;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .zekr-title-inline {
            color: var(--accent-gold);
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .zekr-note {
            background: rgba(212, 175, 55, 0.1);
            border-right: 4px solid var(--accent-gold);
            padding: 12px 18px;
            font-size: 1rem;
            color: #826a21;
            border-radius: 4px;
            font-style: italic;
        }

        /* شريط العداد السفلي */
        .zekr-footer {
            background: #fcfcfc;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        .counter-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .count-display {
            background: var(--primary-green);
            color: white;
            min-width: 60px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(31, 78, 61, 0.2);
        }

        .count-total {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .reset-btn {
            background: white;
            border: 1px solid #e0e0e0;
            color: var(--text-muted);
            padding: 6px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .reset-btn:hover {
            background: #fff0f0;
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .zekr-text { font-size: 1.25rem; }
            .back-btn span { display: none; }
            header { padding: 3rem 1rem 2rem; }
        }
    </style>
</head>
<body>

    <a href="https://adkari.uk" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
        <span>الرئيسية</span>
    </a>

    <header>
        <h1>أذكار النوم</h1>
        <p>حصن المسلم - سكينةٌ لروحك</p>
    </header>

    <main id="azkar-container">
        <!-- الأذكار تُولد هنا -->
    </main>

    <script>
        const azkarData = [
            {
                text: "بِاسْمِكَ رَبِّـي وَضَعْـتُ جَنْـبي ، وَبِكَ أَرْفَعُـه، فَإِن أَمْسَـكْتَ نَفْسـي فارْحَـمْها ، وَإِنْ أَرْسَلْتَـها فاحْفَظْـها بِمـا تَحْفَـظُ بِه عِبـادَكَ الصّـالِحـين.",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "اللّهُـمَّ إِنَّـكَ خَلَـقْتَ نَفْسـي وَأَنْـتَ تَوَفّـاهـا لَكَ ممَـاتـها وَمَحْـياها ، إِنْ أَحْيَيْـتَها فاحْفَظْـها ، وَإِنْ أَمَتَّـها فَاغْفِـرْ لَـها . اللّهُـمَّ إِنَّـي أَسْـأَلُـكَ العـافِـيَة.",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "اللّهُـمَّ قِنـي عَذابَـكَ يَـوْمَ تَبْـعَثُ عِبـادَك.",
                maxCount: 3,
                currentCount: 3
            },
            {
                text: "بِاسْـمِكَ اللّهُـمَّ أَمـوتُ وَأَحْـيا.",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "الـحَمْدُ للهِ الَّذي أَطْـعَمَنا وَسَقـانا، وَكَفـانا، وَآوانا، فَكَـمْ مِمَّـنْ لا كـافِيَ لَـهُ وَلا مُـؤْوي.",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "اللّهُـمَّ عالِـمَ الغَـيبِ وَالشّـهادةِ فاطِـرَ السّماواتِ وَالأرْضِ رَبَّ كُـلِّ شَـيءٍ وَمَليـكَه، أَشْهـدُ أَنْ لا إِلـهَ إِلاّ أَنْت، أَع–وذُ بِكَ مِن شَـرِّ نَفْسـي، وَمِن شَـرِّ الشَّيْـطانِ وَشِـرْكِه، وَأَنْ أَقْتَـرِفَ عَلـى نَفْسـي سوءاً أَوْ أَجُـرَّهُ إِلـى مُسْـلِم .",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "اللّهُـمَّ أَسْـلَمْتُ نَفْـسي إِلَـيْكَ، وَفَوَّضْـتُ أَمْـري إِلَـيْكَ، وَوَجَّـهْتُ وَجْـهي إِلَـيْكَ، وَأَلْـجَـاْتُ ظَهـري إِلَـيْكَ، رَغْبَـةً وَرَهْـبَةً إِلَـيْكَ، لا مَلْجَـأَ وَلا مَنْـجـا مِنْـكَ إِلاّ إِلَـيْكَ، آمَنْـتُ بِكِتـابِكَ الّـذي أَنْزَلْـتَ وَبِنَبِـيِّـكَ الّـذي أَرْسَلْـت.",
                maxCount: 1,
                currentCount: 1
            },
            {
                text: "سُبْحَانَ اللَّهِ (33)، الْحَمْدُ لِلَّهِ (33)، اللَّهُ أَكْبَرُ (34).",
                note: "تُقال عند النوم.",
                maxCount: 1,
                currentCount: 1
            },
            {
                title: "النفث في الكفين",
                text: "يجمع كفيه ثم ينفث فيهما ويقرأ: {قل هو الله أحد} و{قل أعوذ برب الفلق} و{قل أعوذ برب الناس} ثم يمسح بهما ما استطاع من جسده.",
                maxCount: 3,
                currentCount: 3
            },
            {
                title: "خواتيم سورة البقرة",
                text: "آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ...",
                note: "من قرأهما في ليلة كفتاه.",
                maxCount: 1,
                currentCount: 1
            },
            {
                title: "آية الكرسي",
                text: "اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ...",
                note: "لن يزال عليك من الله حافظ ولا يقربك شيطان حتى تصبح.",
                maxCount: 1,
                currentCount: 1
            },
            {
                title: "عند القلق والأرق",
                text: "اللهم رب السموات السبع وما أظلت، ورب الأرضين وما أقلت، ورب الشياطين وما أضلت، كن لي جارا من خلقك كلهم جميعا أن يفرط علي أحد منهم أو أن يبغي علي، عز جارك، وجل ثناؤك ولا إله غيرك.",
                maxCount: 1,
                currentCount: 1
            },
            {
                title: "عند الفزع في النوم",
                text: "أعوذ بكلمات الله التامة من غضبه وشر عباده، ومن همزات الشياطين وأن يحضرون.",
                maxCount: 1,
                currentCount: 1
            },
            {
                title: "عند رؤية ما يكره (الحلم)",
                text: "ينفث عن شماله ثلاثاً، ويتعوذ بالله من الشيطان ومن شر ما رأى (ثلاثاً)، ولا يحدث بها أحداً فإنها لن تضره.",
                maxCount: 1,
                currentCount: 1
            }
        ];

        function renderAzkar() {
            const container = document.getElementById('azkar-container');
            container.innerHTML = '';
            
            azkarData.forEach((zekr, index) => {
                const isDone = zekr.currentCount === 0;
                const card = document.createElement('div');
                card.className = `zekr-card ${isDone ? 'is-done' : ''}`;
                card.onclick = () => decrement(index);

                card.innerHTML = `
                    <div class="zekr-body">
                        <div class="zekr-text">
                            ${zekr.title ? `<span class="zekr-title-inline">${zekr.title}</span>` : ''}
                            ${zekr.text}
                        </div>
                        ${zekr.note ? `<div class="zekr-note">${zekr.note}</div>` : ''}
                    </div>
                    <div class="zekr-footer">
                        <button onclick="reset(${index}, event)" class="reset-btn">إعادة</button>
                        <div class="counter-box">
                            <span class="count-total">من ${zekr.maxCount}</span>
                            <div class="count-display">${zekr.currentCount}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function decrement(index) {
            if (azkarData[index].currentCount > 0) {
                azkarData[index].currentCount--;
                renderAzkar();
                if (navigator.vibrate) navigator.vibrate(40);
            }
        }

        function reset(index, event) {
            event.stopPropagation();
            azkarData[index].currentCount = azkarData[index].maxCount;
            renderAzkar();
        }

        renderAzkar();
    </script>
</body>
</html>
