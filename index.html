    <title>اذكاري</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{
            background:#fdfaf5;
            font-family:'Cairo','Tajawal',sans-serif;
            color:#1e2a26;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            position:relative;
            overflow-x:hidden;
        }
        .donate-corner{
            position:fixed;
            top:20px;
            left:20px;
            z-index:1000;
        }
        .donate-link{
            background:#fff;
            color:#0d3b33;
            padding:10px 20px;
            border-radius:50px;
            text-decoration:none;
            font-size:0.95rem;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:7px;
            box-shadow:0 2px 8px rgba(13,59,51,0.08);
            border:1px solid rgba(201,168,76,0.25);
            transition:transform 0.2s, box-shadow 0.2s;
        }
        .donate-link:hover{
            transform:translateY(-2px);
            box-shadow:0 6px 16px rgba(13,59,51,0.15);
        }
        .heart-icon{
            animation:heartbeat 1.4s infinite;
            font-size:1.1rem;
            color:#e57373;
        }
        @keyframes heartbeat{
            0%,100%{transform:scale(1)}
            25%{transform:scale(1.25)}
            50%{transform:scale(1)}
            75%{transform:scale(1.15)}
        }
        header{
            padding:3.5rem 1.5rem 5rem;
            text-align:center;
            background:#0d3b33;
            color:#fff;
            border-radius:0 0 50px 50px;
            box-shadow:0 10px 30px rgba(13,59,51,0.2);
            position:relative;
            z-index:2;
        }
        header::after{
            content:'';
            position:absolute;
            bottom:10px;
            left:50%;
            transform:translateX(-50%);
            width:60px;
            height:3px;
            background:#c9a84c;
            border-radius:2px;
            opacity:0.7;
        }
        .header-icon{
            font-size:3.2rem;
            display:block;
            animation:floatIcon 3s infinite;
        }
        @keyframes floatIcon{
            0%,100%{transform:translateY(0)}
            50%{transform:translateY(-6px)}
        }
        header h1{
            font-family:'Reem Kufi Fun','Amiri',serif;
            font-size:3.4rem;
            color:#e0c878;
            margin-bottom:2px;
            text-shadow:1px 2px 6px rgba(0,0,0,0.2);
            letter-spacing:1px;
        }
        header .subtitle{
            font-size:1.1rem;
            letter-spacing:2px;
            opacity:0.85;
            color:#d4c9a8;
        }
        main{
            flex:1;
            max-width:780px;
            margin:-3.5rem auto 2.5rem;
            width:93%;
            position:relative;
            z-index:10;
        }
        .container-box{
            background:#fff;
            box-shadow:0 12px 35px rgba(13,59,51,0.1);
            border-radius:28px;
            padding:2rem 1.8rem;
            border:1px solid rgba(201,168,76,0.1);
            position:relative;
        }
        .container-box::before{
            content:'';
            position:absolute;
            top:0;
            right:50%;
            transform:translateX(50%);
            width:45%;
            height:2px;
            background:linear-gradient(90deg,transparent,#0d3b33,transparent);
            border-radius:2px;
        }
        .grid-container{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:12px;
        }
        .btn{
            background:#fff;
            border:1px solid #e8ece6;
            color:#0d3b33;
            padding:17px 8px;
            border-radius:18px;
            text-align:center;
            text-decoration:none;
            font-size:1rem;
            font-weight:700;
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 1px 4px rgba(13,59,51,0.04);
            transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            font-family:'Cairo',sans-serif;
            letter-spacing:0.3px;
        }
        .btn:hover{
            background:#f8faf7;
            border-color:#b8c8bc;
            transform:translateY(-4px);
            box-shadow:0 6px 18px rgba(13,59,51,0.1);
        }
        .btn:active{
            transform:translateY(-1px);
            box-shadow:0 2px 6px rgba(13,59,51,0.06);
        }
        .btn-full{
            grid-column:span 3;
            border-color:#e0d0a0;
            margin-top:6px;
            font-size:1.1rem;
            font-weight:700;
            letter-spacing:0.5px;
        }
        .btn-full:hover{
            border-color:#0d3b33;
            background:#f8faf7;
            box-shadow:0 8px 22px rgba(13,59,51,0.12);
        }
        .btn-icon{
            margin-left:5px;
            font-size:1.1rem;
        }
        .visit-counter-wrapper{
            text-align:center;
            margin-top:2rem;
            padding-bottom:0.5rem;
        }
        .visit-counter{
            display:inline-block;
            background:#fff;
            border:1px solid #e8ece6;
            border-radius:50px;
            padding:10px 26px;
            box-shadow:0 1px 6px rgba(13,59,51,0.05);
            font-size:0.9rem;
            font-weight:600;
            color:#0d3b33;
            letter-spacing:0.3px;
        }
        .visit-counter .count-number{
            color:#0d3b33;
            font-size:1.25rem;
            font-weight:800;
            margin:0 4px;
        }
        .visit-counter .count-icon{
            margin-left:6px;
            font-size:1.1rem;
            animation:floatIcon 2.5s infinite;
        }
        .footer-note{
            text-align:center;
            margin-top:1.5rem;
            color:#8a9a90;
            font-size:0.8rem;
            letter-spacing:0.4px;
            opacity:0.8;
        }
        @media(max-width:640px){
            .grid-container{
                grid-template-columns:repeat(2,1fr);
                gap:10px;
            }
            .btn-full{
                grid-column:span 2;
            }
            .btn{
                font-size:0.9rem;
                padding:15px 5px;
                border-radius:14px;
            }
            header{
                padding:2.2rem 1rem 3.2rem;
                border-radius:0 0 35px 35px;
            }
            header h1{
                font-size:2.5rem;
            }
            header .subtitle{
                font-size:0.95rem;
            }
            .header-icon{
                font-size:2.6rem;
            }
            .donate-corner{
                top:10px;
                left:10px;
            }
            .donate-link{
                padding:8px 14px;
                font-size:0.8rem;
                gap:5px;
            }
            .container-box{
                padding:1.4rem 0.9rem;
                border-radius:22px;
            }
            .visit-counter{
                padding:8px 18px;
                font-size:0.8rem;
            }
            .visit-counter .count-number{
                font-size:1.1rem;
            }
        }
        @media(max-width:380px){
            .grid-container{
                gap:7px;
            }
            .btn{
                font-size:0.8rem;
                padding:13px 3px;
            }
            header h1{
                font-size:2.1rem;
            }
            .header-icon{
                font-size:2.2rem;
            }
        }
    </style>
</head>
