    <title>اذكاري</title>

    <style>
        :root {
            --deep-teal: #0d3b33;
            --teal: #1a5c4a;
            --soft-teal: #2a7d65;
            --gold: #c9a84c;
            --gold-light: #e0c878;
            --gold-pale: #f7f0db;
            --cream: #fdfaf3;
            --white: #ffffff;
            --text-primary: #1e2a26;
            --text-secondary: #4a5b55;
            --shadow-sm: 0 2px 8px rgba(13, 59, 51, 0.06);
            --shadow-md: 0 8px 24px rgba(13, 59, 51, 0.10);
            --shadow-lg: 0 16px 40px rgba(13, 59, 51, 0.14);
            --shadow-gold: 0 6px 20px rgba(201, 168, 76, 0.18);
            --radius-sm: 14px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(175deg, #fdfaf5 0%, #f8f2e4 30%, #f5ede0 60%, #faf6ee 100%);
            font-family: 'Cairo', 'Tajawal', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية زخرفية محسّنة */
        body::before {
            content: '';
            position: fixed;
            top: -180px;
            right: -180px;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle at center, rgba(201, 168, 76, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -120px;
            left: -120px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at center, rgba(26, 92, 74, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* زر التبرع - تصميم جديد */
        .donate-corner {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .donate-link {
            background: linear-gradient(135deg, var(--gold) 0%, #b8923a 100%);
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all var(--transition);
            box-shadow: var(--shadow-gold);
            letter-spacing: 0.3px;
            border: none;
        }

        .donate-link:hover {
            background: linear-gradient(135deg, #d4b35a 0%, #c9a84c 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(201, 168, 76, 0.30);
        }

        .donate-link .heart-icon {
            display: inline-block;
            animation: heartbeat 1.4s ease-in-out infinite;
            font-size: 1.1rem;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.25); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        /* الهيدر */
        header {
            padding: 3.5rem 1.5rem 5rem;
            text-align: center;
            background: linear-gradient(160deg, #0a3328 0%, #0f4536 30%, #155a45 60%, #0d3b33 100%);
            color: white;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 40px rgba(13, 59, 51, 0.25);
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 4px;
            background: var(--gold);
            border-radius: 2px;
            opacity: 0.8;
        }

        .header-icon {
            font-size: 3.5rem;
            margin-bottom: 8px;
            display: block;
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        header h1 {
            font-family: 'Reem Kufi Fun', 'Amiri', serif;
            font-size: 3.6rem;
            color: var(--gold-light);
            margin-bottom: 4px;
            text-shadow: 2px 3px 8px rgba(0, 0, 0, 0.25);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        header .subtitle {
            font-size: 1.15rem;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.85;
            color: #d4c9a8;
            position: relative;
            z-index: 1;
            font-family: 'Cairo', sans-serif;
        }

        main {
            flex: 1;
            max-width: 780px;
            margin: -3.5rem auto 2.5rem;
            width: 93%;
            position: relative;
            z-index: 10;
        }

        .container-box {
            background: var(--white);
            box-shadow: var(--shadow-lg);
            border-radius: var(--radius-lg);
            padding: 2.2rem 1.8rem;
            border: 1px solid rgba(201, 168, 76, 0.12);
            position: relative;
            backdrop-filter: blur(10px);
        }

        /* خط زخرفي أعلى البطاقة */
        .container-box::before {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            transform: translateX(50%);
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 2px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }

        .btn {
            background: #fafcf8;
            border: 1.5px solid #e8ece6;
            color: var(--deep-teal);
            padding: 19px 10px;
            border-radius: var(--radius-md);
            text-align: center;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 700;
            transition: all var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            letter-spacing: 0.4px;
        }

        .btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 60%;
            height: 3px;
            background: var(--gold);
            border-radius: 3px;
            transition: transform var(--transition);
        }

        .btn:hover {
            background: #f0f7f2;
            color: var(--teal);
            border-color: #c8d8cc;
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .btn:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        .btn:active {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            transition: 0.1s;
        }

        .btn-full {
            grid-column: span 3;
            background: linear-gradient(135deg, #fdf8ed 0%, #faf3e0 100%);
            border-color: #e0d0a0;
            color: #8b6f2e;
            margin-top: 8px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.6px;
        }

        .btn-full:hover {
            background: linear-gradient(135deg, #faf0d8 0%, #f5e8c8 100%);
            border-color: var(--gold);
            color: #6b5420;
            box-shadow: var(--shadow-gold);
        }

        .btn-full::after {
            background: #b8923a;
            height: 3px;
        }

        /* أيقونات صغيرة للأزرار */
        .btn-icon {
            display: inline-block;
            margin-left: 6px;
            font-size: 1.2rem;
            transition: transform var(--transition);
        }

        .btn:hover .btn-icon {
            transform: rotate(-10deg) scale(1.1);
        }

        /* عداد الزيارات */
        .visit-counter-wrapper {
            text-align: center;
            margin-top: 2.2rem;
            padding-bottom: 0.5rem;
            position: relative;
            z-index: 5;
        }

        .visit-counter {
            display: inline-block;
            background: var(--white);
            border: 1.5px solid #e8d9a8;
            border-radius: 50px;
            padding: 12px 30px;
            box-shadow: var(--shadow-sm);
            font-family: 'Cairo', sans-serif;
            color: var(--deep-teal);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all var(--transition);
        }

        .visit-counter:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--gold);
        }

        .visit-counter .count-number {
            color: #8b6f2e;
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0 5px;
            font-family: 'Reem Kufi Fun', 'Amiri', serif;
            background: linear-gradient(135deg, #c9a84c, #8b6f2e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .visit-counter .count-icon {
            margin-left: 7px;
            font-size: 1.15rem;
            animation: floatIcon 2.5s ease-in-out infinite;
        }

        /* الفوتر */
        .footer-note {
            text-align: center;
            margin-top: 1.8rem;
            color: #8a9a90;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        /* التجاوب */
        @media (max-width: 640px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .btn-full {
                grid-column: span 2;
            }
            .btn {
                font-size: 0.95rem;
                padding: 16px 6px;
                border-radius: var(--radius-sm);
            }
            header {
                padding: 2.2rem 1rem 3.5rem;
                border-bottom-left-radius: 35px;
                border-bottom-right-radius: 35px;
            }
            header h1 {
                font-size: 2.6rem;
            }
            header .subtitle {
                font-size: 1rem;
            }
            .header-icon {
                font-size: 2.8rem;
            }
            .donate-corner {
                top: 12px;
                left: 12px;
            }
            .donate-link {
                padding: 8px 15px;
                font-size: 0.85rem;
                gap: 5px;
            }
            .container-box {
                padding: 1.5rem 1rem;
                border-radius: var(--radius-md);
            }
            .visit-counter {
                padding: 10px 22px;
                font-size: 0.85rem;
            }
            .visit-counter .count-number {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 380px) {
            .grid-container {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .btn {
                font-size: 0.85rem;
                padding: 14px 4px;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .header-icon {
                font-size: 2.4rem;
            }
        }
    </style>
</head>
